# Disable the default .NET build phase
build: false

environment:
  matrix:
    # Test on a modern Python version (AppVeyor pre-installs these)
    - PYTHON: "C:\\Python311-x64"

install:
  # Upgrade pip
  - "%PYTHON%\\python.exe -m pip install --upgrade pip"
  # Install kernel and test dependencies (mirroring your GitHub Actions setup)
  - "%PYTHON%\\python.exe -m pip install ipykernel"
  - "%PYTHON%\\python.exe -m ipykernel install --user --name python3 --display-name \"Python 3\""
  - "%PYTHON%\\python.exe -m pip install -e ."
  - "%PYTHON%\\python.exe -m pip install pytest"

  # --- NEW: Install Playwright Browsers and Windows Dependencies ---
  - "%PYTHON%\\python.exe -m playwright install --with-deps chromium"

test_script:
  # Run the pytest suite
  - "%PYTHON%\\python.exe -m pytest"